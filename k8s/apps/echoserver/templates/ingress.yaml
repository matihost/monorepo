# yamllint disable-file
{{- $fullName := include "app.fullname" . -}}
{{- if .Values.ingress.enabled }}
{{- if and .Values.ingress.tls.enabled .Values.ingress.tls.externalSecret }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $fullName }}
  namespace: {{ include "app.namespace" . }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    # TODO configure, currently assumes Azure Key Vault
    name: azure-store-spn-secret
  target:
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: kubernetes.io/tls
      engineVersion: v2
      data:
        tls.crt: '{{ "{{ .tls | b64dec | pkcs12cert }}" }}'
        tls.key: '{{ "{{ .tls | b64dec | pkcs12key }}" }}'
  data:
  - secretKey: tls
    remoteRef:
      # Azure Key Vault certificates must be fetched as secret/cert-name
      key: secret/{{ include "cn-name" . }}
{{- end }}
{{- if and .Values.ingress.tls.enabled .Values.ingress.tls.createTlsSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullName }}
  namespace: {{ if eq .Values.ingress.class "istio" }} istio-ingress {{ else }} {{ include "app.namespace" . }} {{ end }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
data:
  tls.crt: {{ .Values.ingress.tls.crt }}
  tls.key: {{ .Values.ingress.tls.key }}
type: kubernetes.io/tls
{{- end }}
---
apiVersion: networking.k8s.io/{{ .Values.ingress.version }}
kind: Ingress
metadata:
  name: {{ $fullName }}
  namespace: {{ include "app.namespace" . }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
{{- if .Values.ingress.class }}
  ingressClassName:  {{ .Values.ingress.class }}
{{- end }}
{{- if .Values.ingress.tls.enabled }}
  tls:
  - hosts:
    - {{ .Values.ingress.host }}
    secretName: {{ $fullName }}
{{- end }}
  rules:
  - host: {{ .Values.ingress.host }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          {{- if eq .Values.ingress.version "v1" }}
          service:
            name: {{ $fullName }}
            port:
              number: 80
          {{- else }}
          serviceName: {{ $fullName }}
          servicePort: 80
          {{- end }}
{{- end }}
